<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penjumlahan Matriks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h2 class="mb-3">Jumlah Kolom dan Baris Matriks</h2>

    
    <div class="table-responsive">
        <table class="table table-bordered text-center">
            <tbody id="matrixBody"></tbody>
        </table>
    </div>
    <div class="d-flex justify-content-end">
        <button class="btn btn-primary mt-2" onclick="processMatrix()">Proses</button>
    </div>

    <script>
        const rows = 3;
        const cols = 3;

        function createMatrix() {
            let matrixBody = document.getElementById("matrixBody");
            for (let i = 0; i <= rows; i++) {
                let row = document.createElement("tr");
                for (let j = 0; j <= cols; j++) {
                    let cell = document.createElement("td");
                    let input = document.createElement("input");
                    input.type = "number";
                    input.className = "form-control text-center";
                    input.value = 0;
                    input.setAttribute("data-row", i);
                    input.setAttribute("data-col", j);
                    if (i === rows || j === cols) {
                        input.readOnly = true;
                        input.classList.add("bg-light");
                    }
                    cell.appendChild(input);
                    row.appendChild(cell);
                }
                matrixBody.appendChild(row);
            }
        }

        function processMatrix() {
            let matrix = Array.from({ length: rows }, () => Array(cols).fill(0));
            let rowSums = Array(rows).fill(0);
            let colSums = Array(cols).fill(0);
            let inputs = document.querySelectorAll("input:not([readonly])");
            
            inputs.forEach(input => {
                let r = parseInt(input.getAttribute("data-row"));
                let c = parseInt(input.getAttribute("data-col"));
                let value = parseInt(input.value) || 0;
                matrix[r][c] = value;
                rowSums[r] += value;
                colSums[c] += value;
            });
            
            document.querySelectorAll("input[readonly]").forEach(input => {
                let r = parseInt(input.getAttribute("data-row"));
                let c = parseInt(input.getAttribute("data-col"));
                if (r === rows) {
                    input.value = colSums[c] || 0;
                } else if (c === cols) {
                    input.value = rowSums[r] || 0;
                }
            });
        }
        
        createMatrix();
    </script>
</body>
</html>
